services:

  db:
    image: postgres:14-alpine
    container_name: hmdm-db
    environment:
      POSTGRES_DB: hmdm
      POSTGRES_USER: hmdm
      POSTGRES_PASSWORD: topsecret
    ports:
      # Avoid conflict when host already runs PostgreSQL (or another stack on 5432).
      - "5433:5432"
    volumes:
      - hmdm_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hmdm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hmdm-backend
    ports:
      - "8080:8080"
    volumes:
      - hmdm_files:/home/launcher
    depends_on:
      db:
        condition: service_healthy

volumes:
  hmdm_db:
  hmdm_files:
