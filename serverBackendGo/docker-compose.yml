# Dev PostgreSQL for serverBackendGo (matches .env.example DATABASE_URL).
# Schema/data: use an existing Headwind MDM DB dump, or start the full stack from repo root (docker-start.sh uses port 5433).
services:
  db:
    image: postgres:14-alpine
    container_name: serverbackendgo-db
    environment:
      POSTGRES_USER: hmdm
      POSTGRES_PASSWORD: hmdm
      POSTGRES_DB: hmdm
    ports:
      - "5432:5432"
    volumes:
      - serverbackendgo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hmdm -d hmdm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  serverbackendgo_pgdata:
