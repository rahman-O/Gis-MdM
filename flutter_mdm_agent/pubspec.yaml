name: mdm_agent
description: "Flutter MDM Agent — background device management service"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Network
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.0
  path_provider: ^2.1.0

  # Device Info
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.0
  package_info_plus: ^8.0.0

  # Location
  geolocator: ^12.0.0

  # Background Service
  flutter_local_notifications: ^17.2.0

  # Firebase (Phase 2)
  # firebase_core: ^3.0.0
  # firebase_messaging: ^15.0.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  mockito: ^5.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
